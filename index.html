<html lang="en">
<head>

    <!-- Social -->
    <meta property="og:title" content="SwiftlyGo Search Engine">
    <meta property="og:description" content="Search anything easily with SwiftlyGo">

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="c:\Users\ahero\Downloads\favicon.png.png">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background-color: #1a1a1a; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100%;
            overflow: hidden;
            box-sizing: border-box;
        }

        .logo {
            font-size: 85px;
            font-weight: bold;
            margin-bottom: 30px;
            letter-spacing: -2px;
            background: linear-gradient(
                to right, 
                #4285F4, #EA4335, #FBBC05, #34A853, #4285F4, #EA4335
            );
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: rainbow_animation 3s linear infinite;
            text-align: center;
        }

        @keyframes rainbow_animation {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        .search-container {
            width: 90%;
            max-width: 580px;
            text-align: center;
        }

        .search-bar {
            width: 100%;
            padding: 15px 25px;
            font-size: 18px;
            border: 1px solid #333;
            border-radius: 30px;
            background-color: #2d2d2d;
            color: white;
        }

        .buttons-container {
            margin-top: 25px;
        }

        .btn {
            background-color: #333;
            border: 1px solid #444;
            border-radius: 6px;
            color: #e8eaed;
            padding: 12px 20px;
            cursor: pointer;
        }

        /* 🌈 Email rainbow */
        .email-link {
            font-weight: bold;
            text-decoration: none;
            background: linear-gradient(
                to right, 
                #4285F4, #EA4335, #FBBC05, #34A853, #4285F4, #EA4335
            );
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: rainbow_animation 3s linear infinite;
        }

        .footer {
            position: absolute; 
            bottom: 25px;
            text-align: center;
            color: #9aa0a6;
        }
    </style>
</head>

<body>

    <div class="logo">SwiftlyGo</div>

    <div class="search-container">
        <input type="text" id="user-query" class="search-bar" placeholder="Search anything..." onkeydown="if(event.key === 'Enter') startSearch()">
        
        <div class="buttons-container">
            <button class="btn" onclick="startSearch()">Swiftly Search</button>
            <button class="btn" onclick="luckySearch()">I'm Feeling Lucky</button>
        </div>
    </div>

    <!-- Hidden SEO content -->
    <div style="display:none;">
        SwiftlyGo is a free search engine website where users can search anything easily.
        It helps users find websites, information, and results quickly.
    </div>

    <div class="footer">
        <p class="made-by">Made with Ayan Sumalani</p>
        <span>Contact us: </span>
        <a href="https://mail.google.com/mail/?view=cm&fs=1&to=OfficialSwiftlyGo@gmail.com" target="_blank" class="email-link">
            OfficialSwiftlyGo@gmail.com
        </a>
    </div>

    <script>
        function startSearch() {
            let query = document.getElementById('user-query').value.trim();
            if (query !== "") {
                const isWebsite = /^([a-z0-9-]+\.)+[a-z]{2,6}(\/.*)?$/i.test(query);
                if (isWebsite) {
                    let url = query.startsWith('http') ? query : 'https://' + query;
                    window.open(url, '_blank');
                } else {
                    window.open("https://www.google.com/search?q=" + encodeURIComponent(query), '_blank');
                }
            } else {
                alert("Please type something to search!");
            }
        }

        function luckySearch() {
            const query = document.getElementById('user-query').value;
            if (query.trim() !== "") {
                window.open("https://www.google.com/search?btnI=1&q=" + encodeURIComponent(query), '_blank');
            } else {
                window.open("https://www.google.com/doodles", '_blank');
            }
        }
    </script>

</body>
</html>
